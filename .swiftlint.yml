included:
  - MailAi
  - Packages
  - Sources
excluded:
  - "**/.build"
  - "**/DerivedData"
  - "**/*.generated.swift"
  # Smoke-executables и test-таргеты — CLT-тесты, свободный стиль.
  - "Packages/*/Sources/*Smoke"
  - "Packages/*/Sources/*SmokeCLI"
  - "Packages/*/Tests"

warnings_as_errors: true

opt_in_rules:
  - array_init
  - attributes
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - discarded_notification_center_observer
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - fatal_error_message
  - first_where
  - flatmap_over_map_reduce
  - identical_operands
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - legacy_random
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_literal_brackets
  - operator_usage_whitespace
  - overridden_super_call
  - override_in_extension
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - redundant_nil_coalescing
  - redundant_type_annotation
  - strict_fileprivate
  - toggle_bool
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - unused_import
  - yoda_condition

disabled_rules:
  - file_header                    # не хотим навязывать шапку
  - todo                           # допускаем TODO:
  - nesting                        # вложенные типы (ID в Account и т.п.) — норма
  - optional_data_string_conversion  # строго опционально, не фатально
  - opening_brace                  # cosmetic
  - vertical_parameter_alignment_on_call  # cosmetic
  - attributes                     # допускаем @main enum X { на одной строке
  - strict_fileprivate             # fileprivate валидно использовать локально
  - statement_position             # else на отдельной строке — тоже норма
  - modifier_order                 # `public nonisolated` vs `nonisolated public` — допускаем оба
  - legacy_multiple                # i % 5 == 0 читаем так же ясно, как isMultiple(of:)
  - pattern_matching_keywords      # cosmetic
  - orphaned_doc_comment           # ложные срабатывания на swiftlint-disable
  - multiple_closures_with_trailing_closure  # редкие случаи допустимы
  - empty_count                    # редко используется, существующий код
  - for_where                      # стилистика

line_length:
  warning: 200
  error: 280

identifier_name:
  min_length:
    warning: 1
    error: 0
  excluded: [id, to, cc, up, on]
  validates_start_with_lowercase: false  # допускаем _writeOutbound bridge-methods

type_name:
  min_length:
    warning: 2
    error: 1

function_body_length:
  warning: 120
  error: 200

file_length:
  warning: 600
  error: 900

type_body_length:
  warning: 400
  error: 600

cyclomatic_complexity:
  warning: 16
  error: 24
